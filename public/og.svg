<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070708"/>
      <stop offset="100%" stop-color="#0d0d10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8ff00"/>
      <stop offset="100%" stop-color="#e8ff7a"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" filter="url(#noise)" opacity="0.06"/>
  <g font-family="Georgia, 'Times New Roman', serif" fill="#f4f1ea">
    <text x="80" y="120" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" letter-spacing="6" fill="#a8a39a">FRONTIER MODEL · LAB UPDATE</text>
    <text x="80" y="280" font-size="148" font-weight="400" letter-spacing="-6">minimax M3</text>
    <text x="80" y="360" font-size="40" font-style="italic" fill="#c8ff00">Frontier agentic intelligence,</text>
    <text x="80" y="410" font-size="40" font-style="italic" fill="#c8ff00">built in the open.</text>
    <text x="80" y="560" font-family="JetBrains Mono, ui-monospace, monospace" font-size="20" letter-spacing="3" fill="#a8a39a">minimax · RESEARCH LAB</text>
  </g>
  <circle cx="1080" cy="120" r="6" fill="url(#accent)"/>
</svg>