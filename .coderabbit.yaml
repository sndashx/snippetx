# 1. Copy this file to your repository as `.coderabbit.yaml`
# 2. Add the GitHub Actions workflow (see below) to your `.github/workflows/` directory
# 3. Commit and push to your repository
# 4. The workflow will automatically process all PRs and generate release notes
# 5. Configure target repositories in the integration section
