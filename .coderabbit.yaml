# CodeRabbit PR & Release Note Automation Configuration
# 
# This configuration customizes CodeRabbit's behavior for generating structured
# PR summaries and release notes for enterprise development teams.
# 
# Purchase this asset for $29 to get instant access to enterprise-grade
# PR automation that standardizes your development documentation.

# PR Summary Configuration
pr_summary:
  # Enable enhanced PR analysis
  enabled: true
  
  # Analysis depth - "comprehensive", "detailed", "standard"
  analysis_depth: "comprehensive"
  
  # Required sections in PR summary
  sections:
    - "Summary"
    - "Changes"
    - "Testing"
    - "Impact"
    - "Review Checklist"
  
  # Auto-generate review checklists based on code patterns
  auto_generate_checklists: true
  
  # Include security implications analysis
  security_analysis: true
  
  # Include performance impact assessment
  performance_analysis: true
  
  # Format preferences
  format:
    style: "markdown"
    max_length: 2000
    include_code_snippets: true

# Release Notes Configuration
release_notes:
  enabled: true
  
  # Version detection strategy
  version_detection:
    strategy: "conventional_commits"  # "conventional_commits", "semantic", "manual"
    extract_from_commits: true
  
  # Release note sections
  sections:
    - "Features"
    - "Fixes"
    - "Security"
    - "Breaking Changes"
    - "Deprecations"
    
  # Grouping strategy
  grouping:
    strategy: "conventional_commits"
    group_by_type: true
    group_by_scope: true
  
  # Include PR links in release notes
  include_pr_links: true
  
  # Format preferences
  format:
    style: "markdown"
    include_date: true
    include_author: true

# Workflow Configuration
workflow:
  # Enable automated PR processing
  auto_process_prs: true
  
  # Auto-comment on PR creation
  auto_comment_on_pr: true
  
  # Auto-update release notes on version tags
  auto_update_release_notes: true
  
  # Notification preferences
  notifications:
    on_pr_created: true
    on_pr_updated: true
    on_release_created: true
    channels: ["github"]

# Integration Settings
integration:
  # Target repositories (comma-separated list)
  target_repositories: []
  
  # Branch patterns to apply configuration
  branch_patterns:
    - "main"
    - "master"
    - "release/*"
    - "feature/*"
  
  # Exclude branches (comma-separated list)
  exclude_branches: ["gh-pages", "docs"]

# Quality Gates
quality_gates:
  # Minimum PR score (0-100)
  min_pr_score: 80
  
  # Require specific labels for merging
  required_labels: ["reviewed", "tested"]
  
  # Block merge if issues present
  block_on_issues: true
  
  # Maximum number of open PRs
  max_open_prs: 10

